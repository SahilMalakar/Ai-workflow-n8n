services:
  - type: web
    name: abacus-mock-erp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_NAME
        value: Abacus ERP Simulator
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: API_VERSION
        value: v1
      - key: API_BASE_PATH
        value: /rest/v1
      - key: TOKEN_EXPIRY_SECONDS
        value: 3600
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: DATABASE_URL
        fromDatabase:
          name: abacus-db
          property: connectionString
      - key: INSTANCE_URL
        sync: false  # set manually to your Render service URL
      - key: ABACUS_CLIENT_ID
        sync: false
      - key: ABACUS_CLIENT_SECRET
        sync: false
      - key: ABACUS_MOCK_TOKEN
        sync: false

databases:
  - name: abacus-db
    databaseName: abacus
    user: abacus
